<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>413 荷物がデカすぎます</title>
<style>
:root{color-scheme:dark}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{min-height:100vh;display:grid;place-items:center;padding:1.5rem;background:#07101f;color:#eef2ff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
main{width:min(92vw,680px);text-align:center}
.hero{position:relative;width:260px;height:280px;margin:0 auto 2rem}
.bag{position:absolute;inset:0;margin:auto;width:230px;height:170px;animation:tilt 3s ease-in-out infinite alternate;transform-origin:50% 40%}
.bag .body{position:absolute;inset:18% 8% 0 8%;background:#c18f62;border:4px solid #5f4424;border-radius:28px 28px 28px 28px;box-shadow:inset 0 8px 0 rgba(255,255,255,.18)}
.bag .inside{position:absolute;left:14%;right:14%;top:6%;height:52%;background:linear-gradient(180deg,#8b6641,#5d4223);border:3px solid #5f4424;border-radius:20px 20px 8px 8px;overflow:visible}
.bag .inside::before{content:'';position:absolute;left:12%;right:12%;top:0;height:8%;background:rgba(255,255,255,.15);border-radius:999px}
.bag .item{position:absolute;display:block;border-radius:4px;border:1px solid rgba(255,255,255,.18);box-shadow:0 0 12px rgba(255,255,255,.15);opacity:.96}
.bag .item1{left:18%;top:-6%;width:48px;height:22px;background:linear-gradient(135deg,#fbf3c7,#fde68a);transform:rotate(-8deg)}
.bag .item2{left:58%;top:-4%;width:42px;height:18px;background:linear-gradient(135deg,#dbeafe,#60a5fa);transform:rotate(6deg)}
.bag .item3{left:14%;top:18%;width:36px;height:20px;background:linear-gradient(135deg,#fda4af,#fb7185);transform:rotate(-6deg)}
.bag .item4{left:40%;top:20%;width:46px;height:22px;background:linear-gradient(135deg,#c4b5fd,#8b5cf6);transform:rotate(8deg)}
.bag .item5{left:60%;top:18%;width:38px;height:20px;background:linear-gradient(135deg,#bbf7d0,#34d399);transform:rotate(-5deg)}
.bag .item6{left:30%;top:32%;width:52px;height:24px;background:linear-gradient(135deg,#fbcfe8,#f472b6);transform:rotate(4deg)}
.bag .item7{left:16%;top:40%;width:42px;height:20px;background:linear-gradient(135deg,#fef3c7,#fde68a);transform:rotate(-4deg)}
.bag .item8{left:58%;top:38%;width:44px;height:22px;background:linear-gradient(135deg,#dbeafe,#93c5fd);transform:rotate(5deg)}
.bag .item9{left:24%;top:52%;width:34px;height:18px;background:linear-gradient(135deg,#bbf7d0,#34d399);transform:rotate(-5deg)}
.bag .item10{left:46%;top:50%;width:48px;height:20px;background:linear-gradient(135deg,#fda4af,#fb7185);transform:rotate(6deg)}
.bag .lip{position:absolute;left:10%;right:10%;top:8%;height:18%;background:#a97134;border:4px solid #5f4424;border-radius:999px 999px 40px 40px;box-shadow:inset 0 6px 0 rgba(255,255,255,.14)}
.handle{position:absolute;left:30%;top:-32px;width:40%;height:30px;border:6px solid #7b5a30;border-bottom-color:transparent;border-radius:999px 999px 0 0}
.particles{position:absolute;inset:0;pointer-events:none;overflow:visible}
.particles span{position:absolute;border-radius:6px;opacity:0;animation:burst 1.6s linear infinite;box-shadow:0 6px 18px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.12);transform-origin:center;will-change:transform,opacity}
.particles span:nth-child(1){left:24%;top:18%;width:18px;height:24px;background:linear-gradient(135deg,#fbf3c7,#fde68a);--tx:-160px;--ty:-220px;animation-delay:-0.20s;transform:rotate(-8deg)}
.particles span:nth-child(2){left:31%;top:18%;width:20px;height:28px;background:linear-gradient(135deg,#dbeafe,#93c5fd);--tx:-80px;--ty:-260px;animation-delay:-0.10s;transform:rotate(4deg)}
.particles span:nth-child(3){left:42%;top:16%;width:16px;height:26px;background:linear-gradient(135deg,#fda4af,#fb7185);--tx:0px;--ty:-280px;animation-delay:-0.00s;transform:rotate(-6deg)}
.particles span:nth-child(4){left:52%;top:18%;width:22px;height:30px;background:linear-gradient(135deg,#a5f3fc,#38bdf8);--tx:80px;--ty:-240px;animation-delay:-0.30s;transform:rotate(6deg)}
.particles span:nth-child(5){left:60%;top:20%;width:18px;height:26px;background:linear-gradient(135deg,#c7d2fe,#818cf8);--tx:160px;--ty:-200px;animation-delay:-0.45s;transform:rotate(-5deg)}
.particles span:nth-child(6){left:14%;top:22%;width:20px;height:28px;background:linear-gradient(135deg,#bbf7d0,#34d399);--tx:-220px;--ty:-120px;animation-delay:-0.55s;transform:rotate(3deg)}
.particles span:nth-child(7){left:36%;top:22%;width:18px;height:26px;background:linear-gradient(135deg,#fde68a,#f59e0b);--tx:-120px;--ty:-60px;animation-delay:-0.65s;transform:rotate(-4deg)}
.particles span:nth-child(8){left:45%;top:20%;width:24px;height:32px;background:linear-gradient(135deg,#fbcfe8,#f472b6);--tx:40px;--ty:-80px;animation-delay:-0.75s;transform:rotate(5deg)}
.particles span:nth-child(9){left:54%;top:18%;width:20px;height:28px;background:linear-gradient(135deg,#c4b5fd,#8b5cf6);--tx:120px;--ty:-40px;animation-delay:-0.85s;transform:rotate(-3deg)}
.particles span:nth-child(10){left:72%;top:22%;width:18px;height:26px;background:linear-gradient(135deg,#fda4af,#fb7185);--tx:220px;--ty:0px;animation-delay:-0.95s;transform:rotate(2deg)}
.particles span:nth-child(11){left:26%;top:18%;width:16px;height:24px;background:linear-gradient(135deg,#fef3c7,#fde68a);--tx:-160px;--ty:40px;animation-delay:-1.05s;transform:rotate(-7deg)}
.particles span:nth-child(12){left:50%;top:16%;width:20px;height:30px;background:linear-gradient(135deg,#dbeafe,#93c5fd);--tx:0px;--ty:80px;animation-delay:-1.15s;transform:rotate(4deg)}
.particles span:nth-child(13){left:64%;top:20%;width:22px;height:30px;background:linear-gradient(135deg,#bbf7d0,#34d399);--tx:160px;--ty:100px;animation-delay:-1.25s;transform:rotate(-5deg)}
.particles span:nth-child(14){left:16%;top:20%;width:24px;height:32px;background:linear-gradient(135deg,#fbcfe8,#f472b6);--tx:-240px;--ty:160px;animation-delay:-1.35s;transform:rotate(5deg)}
.particles span:nth-child(15){left:38%;top:18%;width:18px;height:26px;background:linear-gradient(135deg,#fde68a,#f59e0b);--tx:-40px;--ty:200px;animation-delay:-1.45s;transform:rotate(-6deg)}
.particles span:nth-child(16){left:58%;top:18%;width:20px;height:28px;background:linear-gradient(135deg,#c4b5fd,#8b5cf6);--tx:120px;--ty:220px;animation-delay:-1.55s;transform:rotate(4deg)}
@keyframes tilt{0%{transform:rotate(180deg) translateY(0)}100%{transform:rotate(180deg) translateY(-10px)}}
@keyframes burst{0%{opacity:0;transform:translate(0,0) rotate(0deg) scale(1)}6%{opacity:1}70%{opacity:1;transform:translate(calc(var(--tx)*0.92),calc(var(--ty)*0.92)) rotate(360deg) scale(.98)}
100%{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(720deg) scale(.9)}}
header{margin:0 0 1rem}
h1{font-size:clamp(2.2rem,4vw,3rem);margin:0;letter-spacing:-.02em}
p{margin:.9rem auto 0;max-width:36rem;color:#cbd5e1;line-height:1.7}
.code{display:inline-flex;align-items:center;gap:.5rem;margin:.75rem 0 1.4rem;padding:.7rem 1rem;border:1px solid rgba(226,232,240,.16);border-radius:999px;background:rgba(148,163,184,.06);font-size:.96rem;font-variant-numeric:tabular-nums}
.fine{display:inline-block;margin-top:1rem;padding:.8rem 1.2rem;border-radius:999px;background:rgba(96,165,250,.12);color:#bfdbfe;text-decoration:none;}
</style>
</head>
<body>
<main>
<div class="hero">
<div class="bag">
	<div class="handle"></div>
	<div class="inside">
		<span class="item item1"></span>
		<span class="item item2"></span>
		<span class="item item3"></span>
		<span class="item item4"></span>
		<span class="item item5"></span>
		<span class="item item6"></span>
		<span class="item item7"></span>
		<span class="item item8"></span>
		<span class="item item9"></span>
		<span class="item item10"></span>
	</div>
	<div class="lip"></div>
</div>
<div class="particles">
<span></span><span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span><span></span>
<span></span><span></span>
</div>
</div>
<header>
<h1>413 Payload Too Large</h1>
</header>
<div class="code">荷物がデカすぎます</div>
<p>送信されたデータがサーバーの許容量を超えました。</p>
<p class="fine">必要ならばファイルを軽くするか、分割して再送信してください。</p>
</main>
</body>
</html>
